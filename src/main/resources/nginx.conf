events {
    worker_connections 1024;
}

http {
    upstream backend {
        # 转发到宿主机上的 8081 和 8082
        server host.docker.internal:8081 max_fails=5 fail_timeout=10s weight=1;
        server host.docker.internal:8082 max_fails=5 fail_timeout=10s weight=1;
    }

    server {
        listen 80;

        location /api {
            default_type application/json;

            keepalive_timeout 30s;
            keepalive_requests 1000;

            proxy_http_version 1.1;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass_request_headers on;
            proxy_pass http://backend;
            proxy_next_upstream error timeout;
        }
        # 关键：配置 /uploads 路径的静态文件服务
        location ~ ^/uploads/.*\.(jpg|jpeg|png|gif|webp)$ {
            # - 请求 /uploads/abc.jpg → 映射到 /usr/share/nginx/html/uploads/abc.jpg
            alias /usr/share/nginx/html/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}