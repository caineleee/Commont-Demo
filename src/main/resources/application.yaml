server:
  port: 8081

spring:
#  application:
#    name: demo
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dianping?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password: root
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          max-wait: -1
          min-idle: 0
          time-between-eviction-runs: 10s
      database: 1
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lee.redis.train.demo.entity
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.lee.redis.train.demo: debug