    # 网络配置
    networks:
      - demo-app-cluster # 单机部署集群网络
    # 数据卷挂载
    volumes:
      # 挂载 Redis 数据目录以实现数据持久化
      - redis_slave2_data:/data
    # 依赖关系，确保主节点先启动
    depends_on:
      demo-redis-master:
        condition: service_healthy
    # Redis 启动命令参数
    command: >
      redis-server
      --port 6379
      --protected-mode no
      --daemonize no
      --dir /data
      --dbfilename dump-6381.rdb
      --logfile /data/redis-6381.log
      --appendonly yes
      --appendfilename appendonly-6381.aof
      --replicaof redis-master 6379
      --requirepass root
      --masterauth root
      --loglevel verbose
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "root", "ping" ]
      # 检查间隔
      interval: 60s
      # 超时时间
      timeout: 10s
      # 重试次数
      retries: 3
      start_period: 20s
    profiles:
      - redis-cluster

  # Redis Sentinel 1 服务
  demo-redis-sentinel1:
    # 使用的镜像
    image: redis:7-alpine
    # 容器名称
    container_name: demo-redis-sentinel1
    # 重启策略
    restart: unless-stopped
    # 端口映射
    ports:
      - "26379:26379"
    # 网络配置
    networks:
      - demo-app-cluster # 单机部署集群网络
    # 数据卷挂载
    volumes:
      # 挂载 Sentinel 数据目录
      - sentinel1-data:/data
    # 依赖关系，确保 Redis 主节点先启动
    depends_on:
      demo-redis-master:
          condition: service_healthy
    # Sentinel 启动命令参数
    command: >
      sh -c "
        echo 'port 26379' > /tmp/sentinel.conf &&
        echo 'dir /data' >> /tmp/sentinel.conf &&
        echo 'sentinel monitor mymaster localhost 6379 2' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
        echo 'sentinel resolve-hostnames yes' >> /tmp/sentinel.conf &&
        echo 'sentinel auth-pass mymaster root' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "-a", "root", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis Sentinel 2 服务
  demo-redis-sentinel2:
    # 使用的镜像
    image: redis:7-alpine
    # 容器名称
    container_name: demo-redis-sentinel2
    # 重启策略
