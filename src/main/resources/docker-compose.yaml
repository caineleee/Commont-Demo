# 服务定义
services:
  # MySQL Master 数据库服务
  demo-mysql-shard1:
    # 使用的镜像
    image: mysql:8.0
    # 容器名称
    container_name: demo-mysql-shard1
    # 重启策略
    restart: unless-stopped
    # 端口映射 (主机端口:容器端口)
    ports:
      - "3306:3306"
    # 网络配置
    networks:
      - demo-app-cluster # 单机部署集群网络
    # 环境变量配置
    environment:
      # MySQL root 用户密码
      MYSQL_ROOT_PASSWORD: root
      # 默认创建的数据库名称
      MYSQL_DATABASE: oa-sys-database

      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      # 主从复制配置
      MYSQL_REPLICATION_USER: root
      MYSQL_REPLICATION_PASSWORD: root
    # 数据卷挂载
    volumes:
      # 挂载 MySQL 数据目录以实现数据持久化
      - mysql-data:/var/lib/mysql
      # 挂载主从复制配置
      - ./mysql/master/conf.d:/etc/mysql/conf.d
    # MySQL 启动命令参数
    command:
      - --default-authentication-plugin=mysql_native_password
      # 设置服务器默认字符集, 所有新建数据库和表默认使用 utf8mb4 字符集
      - --character-set-server=utf8mb4
      # 置服务器默认的排序规则 unicode_ci 表示基于 Unicode 标准的排序,ci 表示 case-insensitive(不区分大小写)
      # 影响字符串比较、排序、索引等操作, 与字符集配置配套使用
      - --collation-server=utf8mb4_unicode_ci
      # 跳过客户端字符集协商,强制使用服务器字符集 不管客户端声明什么字符集,服务器都强制使用 utf8mb4 避免因客户端字符集设置不当导致的乱码问题
      - --skip-character-set-client-handshake
      # 每个新连接建立时自动执行的初始化命令 确保连接层面的字符集一致性
      - --init-connect=SET NAMES utf8mb4
      # 设置连接的排序规则 为每个新连接设置 collation_connection 变量 确保排序规则与字符集配置保持一致
      - --init-connect=SET collation_connection = utf8mb4_unicode_ci
      # 启用慢查询日志功能 1 表示开启,0 表示关闭
      - --slow-query-log=1
      # 指定慢查询日志的存储位置
      - --slow-query-log-file=/var/log/mysql/slow.log
      # 定义"慢查询"的时间标准为2秒
      - --long-query-time=2
      # 记录所有没有使用索引的查询 即使执行时间未超过阈值,未使用索引的查询也会被记录 注意: 开发环境有用,生产环境可能产生大量日志
      - --log-queries-not-using-indexes=1
      # 设置日志输出目标 文件方式性能更好,占用资源更少 可选值: FILE, TABLE, NONE
      - --log-output=FILE
      # 主从复制相关配置
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=row
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --require-secure-transport=OFF  # 禁用安全传输要求
    # 健康检查配置
    healthcheck:
      # 健康检查命令
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      # 检查间隔
      interval: 30s
      # 超时时间
      timeout: 10s
      # 重试次数
      retries: 3
      start_period: 40s

  # Redis 主节点服务
  demo-redis-master:
    # 使用的镜像
    image: redis:7-alpine
    # 容器名称
    container_name: demo-redis-master
    # 重启策略
    restart: unless-stopped
    # 端口映射
    ports:
      - "6379:6379"
    # 网络配置
    networks:
      - demo-app-cluster # 单机部署集群网络
    # 数据卷挂载
    volumes:
      # 挂载 Redis 数据目录以实现数据持久化
      - redis_master_data:/data
    # Redis 启动命令参数
    command: >
      redis-server
      --port 6379
      --protected-mode no
      --daemonize no
      --dir /data
      --dbfilename dump-6379.rdb
      --logfile /data/redis-6379.log
      --appendonly yes
      --appendfilename appendonly-6379.aof
      --requirepass root
      --masterauth root
      --loglevel verbose
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root", "ping"]
      # 检查间隔
      interval: 60s
      # 超时时间
      timeout: 10s
      # 重试次数
      retries: 3
      start_period: 20s

  # Redis 从节点1服务
  demo-redis-slave1:
    # 使用的镜像
    image: redis:7-alpine
    # 容器名称
    container_name: demo-redis-slave1
    # 重启策略
    restart: unless-stopped
    # 端口映射
    ports:
      - "6380:6379"
    # 网络配置
    networks:
      - demo-app-cluster # 单机部署集群网络
    # 数据卷挂载
    volumes:
      # 挂载 Redis 数据目录以实现数据持久化
      - redis_slave1_data:/data
    # 依赖关系，确保主节点先启动
    depends_on:
      demo-redis-master:
        condition: service_healthy
    # Redis 启动命令参数
    command: >
      redis-server
      --port 6379
      --protected-mode no
      --daemonize no
      --dir /data
      --dbfilename dump-6380.rdb
      --logfile /data/redis-6380.log
      --appendonly yes
      --appendfilename appendonly-6380.aof
      --replicaof redis-master 6379
      --requirepass root
      --masterauth root
      --loglevel verbose
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "root", "ping" ]
      # 检查间隔
      interval: 60s
      # 超时时间
      timeout: 10s
      # 重试次数
      retries: 3
      start_period: 20s
    profiles:
      - redis-cluster

  # Redis 从节点2服务
  demo-redis-slave2:
    # 使用的镜像
    image: redis:7-alpine
    # 容器名称
    container_name: demo-redis-slave2
    # 重启策略
    restart: unless-stopped
