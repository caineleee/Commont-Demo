# 数据卷定义
volumes:
  # MySQL 数据卷
  mysql-data:
  mysql-shard1-slave1:
  mysql-shard2-data:
  mysql-shard3-data:
  # Redis 主节点数据卷
  redis_master_data:
  # Redis 从节点1数据卷
  redis_slave1_data:
  # Redis 从节点2数据卷
  redis_slave2_data:
  # Sentinel 1 数据卷
  sentinel1-data:
  # Sentinel 2 数据卷
  sentinel2-data:
  # Sentinel 3 数据卷
  sentinel3-data:
  # RabbitMQ 数据卷
#  rabbitmq_data:
  # RabbitMQ 日志数据卷
#  rabbitmq_logs:
  # FastDFS Tracker 数据卷
