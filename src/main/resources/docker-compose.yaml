      "
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "-a", "root", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - redis

  local-nginx-proxy:
    image: nginx:alpine
    container_name: local-nginx-proxy
    ports:
      - "8079:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    # 关键：让容器能访问宿主机（你的本地服务）
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Docker Desktop 推荐方式（Win/Mac）

# 数据卷定义
volumes:
  # MySQL 数据卷
  mysql-data:
  mysql-shard1-slave1:
  mysql-shard2-data:
  mysql-shard3-data:
  # Redis 主节点数据卷
  redis_master_data:
  # Redis 从节点1数据卷
  redis_slave1_data:
  # Redis 从节点2数据卷
  redis_slave2_data:
  # Sentinel 1 数据卷
  sentinel1-data:
  # Sentinel 2 数据卷
  sentinel2-data:
  # Sentinel 3 数据卷
  sentinel3-data:

# 单机部署集群网络
networks:
  demo-app-cluster:
    # 网络驱动类型
    driver: bridge
    # IP地址管理配置
    ipam:
      # IPAM驱动
      driver: default
      config:
        # 子网配置，使用/16网段可提供65534个IP地址
        - subnet: 172.19.0.0/16
          # 网关地址
          gateway: 172.19.0.1