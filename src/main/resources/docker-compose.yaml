  # Redis 主节点服务
  demo-redis-master:
    # 使用的镜像
    image: redis:7-alpine
    # 容器名称
    container_name: demo-redis-master
    # 重启策略
    restart: unless-stopped
    # 端口映射
    ports:
      - "6379:6379"
    # 网络配置
    networks:
      - demo-app-cluster # 单机部署集群网络
    # 数据卷挂载
    volumes:
      # 挂载 Redis 数据目录以实现数据持久化
      - redis_master_data:/data
    # Redis 启动命令参数
    command: >
      redis-server
      --port 6379
      --protected-mode no
      --daemonize no
      --dir /data
      --dbfilename dump-6379.rdb
      --logfile /data/redis-6379.log
      --appendonly yes
      --appendfilename appendonly-6379.aof
      --requirepass root
      --masterauth root
      --loglevel verbose
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root", "ping"]
      # 检查间隔
      interval: 60s
      # 超时时间
      timeout: 10s
      # 重试次数
      retries: 3
      start_period: 20s

  # Redis 从节点1服务
  demo-redis-slave1:
    # 使用的镜像
    image: redis:7-alpine
    # 容器名称
    container_name: demo-redis-slave1
    # 重启策略
    restart: unless-stopped
    # 端口映射
    ports:
      - "6380:6379"
    # 网络配置
    networks:
      - demo-app-cluster # 单机部署集群网络
    # 数据卷挂载
    volumes:
      # 挂载 Redis 数据目录以实现数据持久化
      - redis_slave1_data:/data
    # 依赖关系，确保主节点先启动
    depends_on:
      demo-redis-master:
        condition: service_healthy
    # Redis 启动命令参数
    command: >
      redis-server
      --port 6379
      --protected-mode no
      --daemonize no
      --dir /data
      --dbfilename dump-6380.rdb
      --logfile /data/redis-6380.log
      --appendonly yes
      --appendfilename appendonly-6380.aof
      --replicaof redis-master 6379
      --requirepass root
      --masterauth root
      --loglevel verbose
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "root", "ping" ]
      # 检查间隔
      interval: 60s
      # 超时时间
      timeout: 10s
      # 重试次数
      retries: 3
      start_period: 20s
    profiles:
      - redis-cluster

