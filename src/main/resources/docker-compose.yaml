# 单机部署集群网络
networks:
  demo-app-cluster:
    # 网络驱动类型
    driver: bridge
    # IP地址管理配置
    ipam:
      # IPAM驱动
      driver: default
      config:
        # 子网配置，使用/16网段可提供65534个IP地址
        - subnet: 172.19.0.0/16
          # 网关地址
          gateway: 172.19.0.1